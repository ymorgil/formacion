site_name: Mis apuntes
site_url: https://ymorgil.github.io/formacion/

theme:
   name: material
   language: es
   # logo: assets/favicon.svg
   palette:
      - scheme: default
        primary: green
        accent: indigo
        toggle:
           icon: material/toggle-switch-off-outline
           name: Modo oscuro
      - scheme: slate
        primary: pink
        accent: green
        toggle:
           icon: material/toggle-switch
           name: Modo claro
nav:
   - Inicio: index.md
   - Inglés:
        - EOI: ingles/00-EOI.md
        - Grammar: ingles/01gramatica.md
        - 03 Grammar I: ingles/03grammar.md
        - 05 Phrasal Verbs: ingles/05phrasal.md
        - 10 Recursos: ingles/10recursos.md
        - 11 Dudas: ingles/11dudas.md
        - 12 Duolingo: ingles/12duo.md
        - 13 Pronunciación: ingles/13pronu.md
        - 20 Audiobooks: ingles/20audiobooks.md
        - 21 Vocabulario: ingles/21vocab.md
        - 22 Claude: ingles/tutorclaude.md
   - Trade:
        - 00 Introducción: trade/00-introduccion.md
        - 01 Tipos de activos: trade/01-tipos-de-activos.md
        - 02 Órdenes y mercados: trade/02-ordenes-y-mercados.md
        - 03 Riesgo, diversificación y fiscalidad: trade/03-riesgo-diversificacion-fiscalidad.md
        - 04 Glosario y primeros pasos: trade/04-glosario-primeros-pasos.md
   - Criptomonedas:
        - 00 Introducción y blockchain: criptomonedas/00-introduccion-blockchain.md
        - 01 Monederos y wallets: criptomonedas/01-monederos-wallets.md
        - 02 Exchanges, seguridad y regulación: criptomonedas/02-exchanges-seguridad-regulacion.md
        - 03 Tipos de criptoactivos: criptomonedas/03-tipos-de-criptoactivos.md
        - 04 Primeros pasos prácticos: criptomonedas/04-primeros-pasos-practicos.md
   - eXeLearning:
        - 00 Introducción: exelearning/00-introduccion.md
   - TikTok:
        - Apps y recursos (colección Inglés): tiktok/README.md
   - Webvilla:
        - Tarjeta de noticia: webvilla/tarjeta-noticia.md
        - Inicio: webvilla/index.md
        - MCP, Claude Code y Claude en Chrome: webvilla/claude-chrome-divi.md
        - configuración: webvilla/webconf.md

plugins:
   - glightbox # Cuando el usuario hace clic en una imagen se abre en una ventana emergente (lightbox)

extra_css:
   - assets/css/extra.css

extra_javascript:
   - assets/javascripts/nav-toggle.js

markdown_extensions:
   - attr_list
   - tables
   - admonition
   - pymdownx.details
   - pymdownx.highlight:
        anchor_linenums: false
        use_pygments: true
   - pymdownx.superfences
   - pymdownx.inlinehilite
