site_name: Mis apuntes
site_url: https://ymorgil.github.io/formacion/

theme:
   name: material
   language: es
   # logo: assets/favicon.svg
   palette:
      - scheme: default
        primary: green
        accent: indigo
        toggle:
           icon: material/toggle-switch-off-outline
           name: Modo oscuro
      - scheme: slate
        primary: pink
        accent: green
        toggle:
           icon: material/toggle-switch
           name: Modo claro
nav:
   - Inicio: index.md
   - Inglés:
        - Recursos: ingles/01introing.md
        - Verbos: ingles/02verbos.md
        - Phrasal: ingles/04phrasal.md
        - Grammar I: ingles/05grammar.md
        - Grammar II: ingles/05grammar2.md
        - Pronunciación: ingles/06pronu.md
        - Dudas: ingles/10dudas.md
        - Audiobooks: ingles/20audiobooks.md
plugins:
   - glightbox # Cuando el usuario hace clic en una imagen se abre en una ventana emergente (lightbox)

extra_css:
   - assets/css/extra.css

markdown_extensions:
   - attr_list
